<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Assistant - Dashboard</title>
    <script src="../lib/chart.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; padding: 25px; background: rgba(255,255,255,0.1); border-radius: 15px; }
        h1 { font-size: 1.5rem; margin-bottom: 10px; background: linear-gradient(90deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #aaa; font-size: 0.9rem; }
        .back-link { display: block; text-align: center; margin-bottom: 20px; }
        .back-link a { color: #00d4ff; text-decoration: none; font-size: 1.1rem; }
        .back-link a:hover { text-decoration: underline; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .card { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; }
        .card-title { font-size: 1.2rem; margin-bottom: 15px; color: #00d4ff; }
        .chart-container { position: relative; height: 250px; display: flex; justify-content: center; }
        .sensor-card { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; border-left: 4px solid #00d4ff; }
        .sensor-name { color: #ccc; }
        .sensor-value { font-size: 1.3rem; font-weight: bold; color: #00d4ff; }
        .status-bar { margin-top: 25px; text-align: center; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        #lastUpdate { color: #888; font-size: 0.85rem; }
        .error-msg { color: #FF6384; text-align: center; padding: 20px; }
        .loading { text-align: center; padding: 40px; color: #aaa; }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="back-link"><a href="../">&larr; Volver al Dashboard</a></div>
    <div class="container">
        <header>
            <h1>???? Home Assistant</h1>
            <p class="subtitle">Sensores WiFi</p>
        </header>
        <div class="dashboard-grid">
            <div class="card">
                <div class="card-title">???? Sensores WiFi</div>
                <div class="chart-container"><canvas id="sensorChart"></canvas></div>
            </div>
            <div class="card">
                <div class="card-title">???? Detalles</div>
                <div id="sensorInfo"><div class="loading">Cargando datos...</div></div>
            </div>
        </div>
        <div class="status-bar" id="lastUpdate">-</div>
    </div>
    <script>
        var apiBase = '';
        var sensorChart = null;
        
        function initChart() {
            var ctx = document.getElementById('sensorChart');
            if (!ctx) return;
            var ctx2 = ctx.getContext('2d');
            if (!ctx2) return;
            sensorChart = new Chart(ctx2, {
                type: 'doughnut',
                data: { labels: ['Cargando'], datasets: [{ data: [1], backgroundColor: ['#00d4ff'] }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
            });
        }
        
        function updateHAChart(data) {
            if (!sensorChart || !data) return;
            sensorChart.data.labels = data.map(function(d) { return d.name; });
            sensorChart.data.datasets[0].data = data.map(function(d) { return d.value; });
            sensorChart.update();
        }
        
        function loadSensorData() {
            var info = document.getElementById('sensorInfo');
            var update = document.getElementById('lastUpdate');
            if (info) info.innerHTML = '<div class="loading">Cargando datos...</div>';
            if (update) update.textContent = 'Actualizando...';
            
            fetch(apiBase + 'proxy.php?action=ha_entities')
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    updateHAChart(data);
                    if (info && data) {
                        info.innerHTML = data.map(function(s) {
                            return '<div class="sensor-card"><span class="sensor-name">' + s.name + '</span><span class="sensor-value">' + s.value + '</span></div>';
                        }).join('');
                    }
                    if (update) update.textContent = '??ltima actualizaci??n: ' + new Date().toLocaleTimeString();
                })
                .catch(function(err) {
                    if (info) info.innerHTML = '<div class="error-msg">Error cargando datos</div>';
                    console.error(err);
                });
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            initChart();
            loadSensorData();
            setInterval(loadSensorData, 60000);
        });
    </script>
</body>
</html>

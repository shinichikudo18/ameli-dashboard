<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Red Wifi - Fortigate</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #aaa;
            font-size: 1rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .stat-label {
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .clients-section {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #00d4ff;
        }
        
        .filter-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        select, input {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1rem;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .client-card {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        
        .client-header {
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }
        
        .client-header:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .client-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .client-name {
            font-weight: bold;
            color: #fff;
        }
        
        .client-ip {
            color: #aaa;
            font-size: 0.9rem;
        }
        
        .signal-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .signal-good {
            background: rgba(75, 192, 192, 0.3);
            color: #4BC0C0;
        }
        
        .signal-fair {
            background: rgba(255, 206, 86, 0.3);
            color: #FFCE56;
        }
        
        .signal-poor {
            background: rgba(255, 99, 132, 0.3);
            color: #FF6384;
        }
        
        .client-details {
            padding: 20px;
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .client-details.open {
            display: grid;
        }
        
        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .detail-label {
            color: #888;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        
        .detail-value {
            color: #fff;
            font-size: 1rem;
        }
        
        .status-bar {
            margin-top: 30px;
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        
        #lastUpdate {
            color: #888;
            font-size: 0.9rem;
        }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #4BC0C0;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .chevron {
            transition: transform 0.3s;
        }
        
        .client-card.open .chevron {
            transform: rotate(180deg);
        }
        
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.8rem;
            }
            header {
                padding: 20px;
                margin-bottom: 20px;
            }
            .card {
                padding: 20px;
            }
            body {
                padding: 10px;
            }
            .client-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Dashboard Red Wifi</h1>
            <p class="subtitle">Monitor de Clientes - Fortigate</p>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalClients">0</div>
                <div class="stat-label">Total Clientes</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="signalGood">0</div>
                <div class="stat-label">Señal Buena</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="signalFair">0</div>
                <div class="stat-label">Señal Regular</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="signalPoor">0</div>
                <div class="stat-label">Señal Mala</div>
            </div>
        </div>
        
        <div class="clients-section">
            <h2 class="section-title">Clientes Conectados</h2>
            
            <div class="filter-bar">
                <select id="ssidFilter">
                    <option value="">Todos los SSID</option>
                </select>
                <select id="apFilter">
                    <option value="">Todos los APs</option>
                </select>
                <input type="text" id="searchFilter" placeholder="Buscar por IP o hostname...">
                <button onclick="toggleDebug()" style="padding:10px 15px;background:#00d4ff;border:none;border-radius:8px;cursor:pointer;color:#000;font-weight:bold;">📋 Ver JSON</button>
            </div>
            
            <div id="debugPanel" style="display:none;background:#000;padding:15px;border-radius:10px;margin-bottom:20px;overflow-x:auto;">
                <pre id="debugContent" style="color:#0f0;white-space:pre-wrap;font-size:12px;"></pre>
            </div>
            
            <div id="clientsList"></div>
        </div>
        
        <div class="status-bar">
            <span class="status-indicator"></span>
            <span id="lastUpdate">Conectando...</span>
        </div>
    </div>
    
    <script>
        let allClients = [];
        
        async function fetchClients() {
            try {
                const response = await fetch('/dashboard/fortigate.php');
                if (!response.ok) throw new Error('Error fetching clients');
                const data = await response.json();
                return data.results || [];
            } catch (error) {
                console.error('Error:', error);
                return [];
            }
        }
        
        function getSignalClass(signal) {
            if (signal >= -50) return 'signal-good';
            if (signal >= -70) return 'signal-fair';
            return 'signal-poor';
        }
        
        function getSignalText(signal) {
            if (signal >= -50) return 'Bueno';
            if (signal >= -70) return 'Regular';
            return 'Malo';
        }
        
        function populateFilters(clients) {
            const ssids = [...new Set(clients.map(c => c.ssid).filter(Boolean))];
            const aps = [...new Set(clients.map(c => c.wtp_name).filter(Boolean))];
            
            const ssidFilter = document.getElementById('ssidFilter');
            const apFilter = document.getElementById('apFilter');
            
            ssids.forEach(ssid => {
                const opt = document.createElement('option');
                opt.value = ssid;
                opt.textContent = ssid;
                ssidFilter.appendChild(opt);
            });
            
            aps.forEach(ap => {
                const opt = document.createElement('option');
                opt.value = ap;
                opt.textContent = ap;
                apFilter.appendChild(opt);
            });
        }
        
        function updateStats(clients) {
            document.getElementById('totalClients').textContent = clients.length;
            
            const good = clients.filter(c => c.signal >= -50).length;
            const fair = clients.filter(c => c.signal >= -70 && c.signal < -50).length;
            const poor = clients.filter(c => c.signal < -70).length;
            
            document.getElementById('signalGood').textContent = good;
            document.getElementById('signalFair').textContent = fair;
            document.getElementById('signalPoor').textContent = poor;
        }
        
        function renderClients(clients) {
            const container = document.getElementById('clientsList');
            container.innerHTML = '';
            
            if (clients.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#888;padding:20px;">No hay clientes</p>';
                return;
            }
            
            clients.forEach((client, index) => {
                const signalClass = getSignalClass(client.signal);
                const signalText = getSignalText(client.signal);
                const hostname = client.hostname || client.host || 'Desconocido';
                
                const card = document.createElement('div');
                card.className = 'client-card';
                card.innerHTML = `
                    <div class="client-header" onclick="toggleDetails(${index})">
                        <div class="client-info">
                            <span class="client-name">${hostname}</span>
                            <span class="client-ip">${client.ip}</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:15px;">
                            <span class="signal-badge ${signalClass}">${signalText} (${client.signal} dBm)</span>
                            <span class="chevron">▼</span>
                        </div>
                    </div>
                    <div class="client-details" id="details-${index}">
                        <div class="detail-item">
                            <span class="detail-label">MAC</span>
                            <span class="detail-value">${client.mac}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">SSID</span>
                            <span class="detail-value">${client.ssid}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">AP</span>
                            <span class="detail-value">${client.wtp_name}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Canal</span>
                            <span class="detail-value">${client.channel}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Señal</span>
                            <span class="detail-value">${client.signal} dBm</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">SNR</span>
                            <span class="detail-value">${client.snr}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Tipo</span>
                            <span class="detail-value">${client.radio_type}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Fabricante</span>
                            <span class="detail-value">${client.manufacturer || 'N/A'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Vel. Descarga</span>
                            <span class="detail-value">${(client.data_rxrate_bps / 1000000).toFixed(1)} Mbps</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Vel. Subida</span>
                            <span class="detail-value">${(client.data_txrate_bps / 1000000).toFixed(1)} Mbps</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Última Actividad</span>
                            <span class="detail-value">${new Date(client.association_time * 1000).toLocaleString()}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        function toggleDetails(index) {
            const details = document.getElementById(`details-${index}`);
            const card = details.parentElement;
            details.classList.toggle('open');
            card.classList.toggle('open');
        }
        
        function toggleDebug() {
            const panel = document.getElementById('debugPanel');
            const content = document.getElementById('debugContent');
            if (panel.style.display === 'none') {
                content.textContent = JSON.stringify(allClients, null, 2);
                panel.style.display = 'block';
            } else {
                panel.style.display = 'none';
            }
        }
        
        function filterClients() {
            const ssid = document.getElementById('ssidFilter').value;
            const ap = document.getElementById('apFilter').value;
            const search = document.getElementById('searchFilter').value.toLowerCase();
            
            let filtered = allClients;
            
            if (ssid) {
                filtered = filtered.filter(c => c.ssid === ssid);
            }
            if (ap) {
                filtered = filtered.filter(c => c.wtp_name === ap);
            }
            if (search) {
                filtered = filtered.filter(c => 
                    c.ip.toLowerCase().includes(search) ||
                    (c.hostname && c.hostname.toLowerCase().includes(search)) ||
                    (c.host && c.host.toLowerCase().includes(search))
                );
            }
            
            renderClients(filtered);
        }
        
        async function refreshData() {
            document.getElementById('lastUpdate').textContent = 'Actualizando...';
            
            allClients = await fetchClients();
            
            populateFilters(allClients);
            updateStats(allClients);
            renderClients(allClients);
            
            document.getElementById('lastUpdate').textContent = `Última actualización: ${new Date().toLocaleTimeString()}`;
        }
        
        document.getElementById('ssidFilter').addEventListener('change', filterClients);
        document.getElementById('apFilter').addEventListener('change', filterClients);
        document.getElementById('searchFilter').addEventListener('input', filterClients);
        
        document.addEventListener('DOMContentLoaded', () => {
            refreshData();
            setInterval(refreshData, 30000);
        });
    </script>
</body>
</html>
